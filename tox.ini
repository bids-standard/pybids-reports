[tox]
requires =
    tox>=4
    tox-uv
env_list = test

[global_var]
passenv =
  # getpass.getuser() sources for Windows:
  LOGNAME
  USER
  LNAME
  USERNAME
  # Pass user color preferences through
  PY_COLORS
  FORCE_COLOR
  NO_COLOR
  CLICOLOR
  CLICOLOR_FORCE

[testenv:test]
description = Pytest with coverage
labels = test
passenv = {[global_var]passenv}
dependency_groups = test
commands =
  pytest --pyargs bids.ext.reports \
  -n auto \
  --cov=bids.ext.reports --cov-report xml --cov-report term \
  {posargs}


[testenv:test_cli]
description = test CLI
labels = cli
passenv = {[global_var]passenv}
commands =
  {envpython} tools/run_on_examples.py
